---
layout: default
title: Blog
permalink: /blog/
---

<h2 class="section-title">Blog</h2>
<div id="blog-list">
    {% for post in site.posts %}
        <div class="blog-item">
            <a href="{{ post.url | relative_url }}">
                <h3>{{ post.title }}</h3>
                <span class="date">{{ post.date_display | default: post.date | date: "%B %-d, %Y" }}</span>
                <p>{{ post.intro | default: post.excerpt }}</p>
            </a>
        </div>
    {% endfor %}
</div>
