---
layout: default
---

<nav class="breadcrumb"><a href="{{ '/blog/' | relative_url }}">← Blog</a></nav>
<article class="full-post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        <time class="date">{{ page.date_display | default: page.date | date: "%B %-d, %Y" }}</time>
    </header>

    {% if page.intro %}
        <p class="post-intro">{{ page.intro }}</p>
    {% endif %}

    {% if page.video_url %}
        <figure class="post-media">
            <video controls muted playsinline aria-label="{{ page.video_caption }}">
                <source src="{{ page.video_url }}" type="video/webm">
                Your browser does not support the video tag.
            </video>
            {% if page.video_caption %}<figcaption>{{ page.video_caption }}</figcaption>{% endif %}
        </figure>
    {% endif %}

    <div class="post-body">
        {{ content }}
    </div>
</article>
